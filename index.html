<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Бюджет" />
  <title>Бюджет</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #0a0a0a; color: #e8e8e8; font-family: -apple-system, 'Inter', system-ui, sans-serif; }
    input, select, button { font-family: inherit; }
    input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1); }
    ::-webkit-scrollbar { display: none; }
    #header {
      background: #141414;
      border-bottom: 1px solid #2a2a2a;
      position: sticky;
      top: 0;
      z-index: 20;
      padding-top: env(safe-area-inset-top);
    }
    #header-inner {
      max-width: 640px;
      margin: 0 auto;
      padding: 16px 16px 0;
    }
    #content {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 16px;
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const { createClient } = supabase;
const sb = createClient(
  'https://dlyhebypuholvobblaaj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRseWhlYnlwdWhvbHZvYmJsYWFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMzY0OTEsImV4cCI6MjA5NzkxMjQ5MX0.Wd1fnt6fTspMiwWoN31AGJTWOrl2M7fkwWW2XGf2Ymk'
);

const CATS = {
  income:  ['Зарплата','Фриланс','Инвестиции','Подарок','Другое'],
  expense: ['Еда','Транспорт','Жильё','Развлечения','Здоровье','Одежда','Связь','Другое'],
};
const ICONS = { Еда:'🍕',Транспорт:'🚇',Жильё:'🏠',Развлечения:'🎬',Здоровье:'💊',Одежда:'👕',Связь:'📱',Зарплата:'💼',Фриланс:'💻',Инвестиции:'📈',Подарок:'🎁',Другое:'📌' };
const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

const P = {
  bg:'#0a0a0a', card:'#141414', border:'#2a2a2a',
  green:'#22c55e', red:'#ef4444', muted:'#6b7280', muted2:'#9ca3af', text:'#e8e8e8', white:'#ffffff',
};

const fmt = n => new Intl.NumberFormat('ru-RU',{style:'currency',currency:'RUB',maximumFractionDigits:0}).format(n);
const today = new Date();
const todayStr = today.toISOString().slice(0,10);
const currentMonth = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;

function App() {
  const [txs, setTxs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [form, setForm] = useState({type:'expense',category:'Еда',amount:'',date:todayStr,note:''});
  const [showForm, setShowForm] = useState(false);
  const [month, setMonth] = useState(currentMonth);
  const [tab, setTab] = useState('overview');
  const [delId, setDelId] = useState(null);

  useEffect(() => {
    load();
    const ch = sb.channel('txs')
      .on('postgres_changes',{event:'*',schema:'public',table:'transactions'}, load)
      .subscribe();
    return () => sb.removeChannel(ch);
  }, []);

  async function load() {
    const { data } = await sb.from('transactions').select('*').order('date',{ascending:false});
    setTxs(data || []);
    setLoading(false);
  }

  async function add() {
    const amount = Number(form.amount);
    if (!amount || amount <= 0) return;
    const { error } = await sb.from('transactions').insert([{type:form.type,category:form.category,amount,date:form.date,note:form.note||null}]);
    if (!error) { setForm(f=>({...f,amount:'',note:''})); setShowForm(false); flash('Сохранено ✓'); }
    else flash('Ошибка', true);
  }

  async function del(id) {
    await sb.from('transactions').delete().eq('id',id);
    setDelId(null);
    flash('Удалено');
  }

  function flash(msg, err=false) { setToast({msg,err}); setTimeout(()=>setToast(null),2500); }

  const filtered = useMemo(()=>txs.filter(t=>t.date.startsWith(month)).sort((a,b)=>b.date.localeCompare(a.date)),[txs,month]);
  const income  = filtered.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0);
  const expense = filtered.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);
  const balance = income - expense;

  const expCats = useMemo(()=>{
    const m={};filtered.filter(t=>t.type==='expense').forEach(t=>{m[t.category]=(m[t.category]||0)+Number(t.amount);});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  },[filtered]);
  const incCats = useMemo(()=>{
    const m={};filtered.filter(t=>t.type==='income').forEach(t=>{m[t.category]=(m[t.category]||0)+Number(t.amount);});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  },[filtered]);

  const [yr,mo] = month.split('-');
  const monthLabel = `${MONTHS[parseInt(mo)-1]} ${yr}`;

  if (loading) return (
    <div style={{minHeight:'100vh',background:P.bg,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
      <div style={{width:36,height:36,border:`3px solid ${P.border}`,borderTop:`3px solid ${P.green}`,borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
      <div style={{color:P.muted,fontSize:14}}>Загрузка...</div>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',background:P.bg,color:P.text}}>

      {/* Header */}
      <div id="header">
        <div id="header-inner">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div>
              <div style={{fontSize:10,letterSpacing:3,color:P.green,textTransform:'uppercase',marginBottom:2,fontWeight:700}}>Совместный</div>
              <div style={{fontSize:24,fontWeight:900,letterSpacing:-1,color:P.white}}>Бюджет</div>
            </div>
            <button onClick={()=>setShowForm(v=>!v)}
              style={{background:showForm?'transparent':P.green,border:`1px solid ${showForm?P.border:P.green}`,color:showForm?P.muted2:P.bg,borderRadius:12,padding:'10px 18px',fontSize:14,fontWeight:700,cursor:'pointer'}}>
              {showForm?'✕ Закрыть':'+ Добавить'}
            </button>
          </div>

          <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:12}}>
            {[-2,-1,0,1].map(d=>{
              const dt=new Date(today.getFullYear(),today.getMonth()+d,1);
              const val=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
              const active=val===month;
              return <button key={val} onClick={()=>setMonth(val)}
                style={{flexShrink:0,background:active?P.green:'transparent',border:`1px solid ${active?P.green:P.border}`,color:active?P.bg:P.muted,borderRadius:20,padding:'5px 14px',fontSize:12,cursor:'pointer',fontWeight:active?700:400}}>
                {MONTHS[dt.getMonth()].slice(0,3)} {dt.getFullYear()}
              </button>;
            })}
          </div>

          <div style={{display:'flex'}}>
            {[['overview','Обзор'],['transactions','Операции'],['stats','Статистика']].map(([k,l])=>(
              <button key={k} onClick={()=>setTab(k)}
                style={{flex:1,background:'transparent',border:'none',borderBottom:`2px solid ${tab===k?P.green:'transparent'}`,color:tab===k?P.green:P.muted,padding:'8px 0 10px',fontSize:13,fontWeight:tab===k?700:400,cursor:'pointer'}}>
                {l}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div id="content">

        {/* Form */}
        {showForm && (
          <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:18,padding:20,marginTop:16,animation:'fadeIn 0.2s ease'}}>
            <div style={{fontSize:15,fontWeight:700,marginBottom:14,color:P.white}}>Новая операция</div>
            <div style={{display:'flex',gap:8,marginBottom:16}}>
              {['expense','income'].map(t=>(
                <button key={t} onClick={()=>setForm(f=>({...f,type:t,category:CATS[t][0]}))}
                  style={{flex:1,padding:'10px 0',borderRadius:10,border:`1px solid ${form.type===t?(t==='income'?P.green:P.red):P.border}`,background:form.type===t?(t==='income'?'#22c55e18':'#ef444418'):'transparent',color:form.type===t?(t==='income'?P.green:P.red):P.muted,fontWeight:700,fontSize:14,cursor:'pointer'}}>
                  {t==='income'?'▲ Доход':'▼ Расход'}
                </button>
              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {[
                {label:'Категория', el:<select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={{width:'100%',background:P.bg,border:`1px solid ${P.border}`,color:P.text,borderRadius:10,padding:'10px 12px',fontSize:14}}>{CATS[form.type].map(c=><option key={c}>{c}</option>)}</select>},
                {label:'Сумма, ₽', el:<input type="number" placeholder="0" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} style={{width:'100%',background:P.bg,border:`1px solid ${P.border}`,color:P.text,borderRadius:10,padding:'10px 12px',fontSize:14,boxSizing:'border-box'}}/>},
                {label:'Дата', el:<input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={{width:'100%',background:P.bg,border:`1px solid ${P.border}`,color:P.text,borderRadius:10,padding:'10px 12px',fontSize:14,boxSizing:'border-box'}}/>},
                {label:'Заметка', el:<input type="text" placeholder="Необязательно" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} style={{width:'100%',background:P.bg,border:`1px solid ${P.border}`,color:P.text,borderRadius:10,padding:'10px 12px',fontSize:14,boxSizing:'border-box'}}/>},
              ].map(({label,el})=>(
                <div key={label}>
                  <div style={{fontSize:11,color:P.muted,marginBottom:5}}>{label}</div>
                  {el}
                </div>
              ))}
            </div>
            <button onClick={add} style={{width:'100%',background:P.green,border:'none',color:P.bg,borderRadius:12,padding:'13px 0',fontSize:15,fontWeight:800,cursor:'pointer',marginTop:14}}>
              Сохранить
            </button>
          </div>
        )}

        {/* OVERVIEW */}
        {tab==='overview' && (
          <>
            <div style={{marginTop:20,fontSize:11,color:P.muted,textAlign:'center',letterSpacing:2,textTransform:'uppercase',marginBottom:12}}>{monthLabel}</div>

            <div style={{background:P.card,border:`1px solid ${balance>=0?'#22c55e30':'#ef444430'}`,borderRadius:20,padding:'28px 24px',textAlign:'center',marginBottom:12,position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:balance>=0?P.green:P.red}}/>
              <div style={{fontSize:11,color:P.muted,letterSpacing:2,textTransform:'uppercase',marginBottom:8}}>Баланс за период</div>
              <div style={{fontSize:40,fontWeight:900,letterSpacing:-2,color:balance>=0?P.green:P.red}}>
                {balance>=0?'+':''}{fmt(balance)}
              </div>
              <div style={{fontSize:13,color:balance>=0?P.green:P.red,marginTop:6,fontWeight:600}}>
                {balance>=0?'↑ Вы в плюсе':'↓ Расходы превышают доходы'}
              </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              <div style={{background:P.card,border:`1px solid #22c55e20`,borderRadius:16,padding:'16px 14px'}}>
                <div style={{fontSize:10,color:P.green,textTransform:'uppercase',letterSpacing:1.5,marginBottom:8,fontWeight:700}}>Доходы</div>
                <div style={{fontSize:20,fontWeight:800,color:P.green}}>{fmt(income)}</div>
                <div style={{fontSize:11,color:P.muted,marginTop:4}}>{filtered.filter(t=>t.type==='income').length} операций</div>
              </div>
              <div style={{background:P.card,border:`1px solid #ef444420`,borderRadius:16,padding:'16px 14px'}}>
                <div style={{fontSize:10,color:P.red,textTransform:'uppercase',letterSpacing:1.5,marginBottom:8,fontWeight:700}}>Расходы</div>
                <div style={{fontSize:20,fontWeight:800,color:P.red}}>{fmt(expense)}</div>
                <div style={{fontSize:11,color:P.muted,marginTop:4}}>{filtered.filter(t=>t.type==='expense').length} операций</div>
              </div>
            </div>

            {income>0 && (
              <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:16,padding:'14px 16px',marginBottom:16}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                  <div style={{fontSize:13,color:P.muted2}}>Норма сбережений</div>
                  <div style={{fontSize:13,fontWeight:800,color:balance>=0?P.green:P.red}}>{Math.round(Math.max(0,balance)/income*100)}%</div>
                </div>
                <div style={{height:4,background:P.border,borderRadius:2,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${Math.max(0,Math.min(100,balance/income*100))}%`,background:balance>=0?P.green:P.red,borderRadius:2}}/>
                </div>
              </div>
            )}

            {filtered.length>0 && <>
              <div style={{fontSize:11,color:P.muted,letterSpacing:1.5,textTransform:'uppercase',marginBottom:10,fontWeight:600}}>Последние</div>
              {filtered.slice(0,5).map(t=><TRow key={t.id} t={t} onDel={setDelId}/>)}
              {filtered.length>5 && <div onClick={()=>setTab('transactions')} style={{textAlign:'center',color:P.green,fontSize:13,marginTop:10,cursor:'pointer',fontWeight:600}}>Все операции ({filtered.length}) →</div>}
            </>}
            {filtered.length===0 && <Empty onAdd={()=>setShowForm(true)}/>}
          </>
        )}

        {tab==='transactions' && (
          <div style={{marginTop:16}}>
            {filtered.length===0 && <Empty onAdd={()=>setShowForm(true)}/>}
            {filtered.map(t=><TRow key={t.id} t={t} onDel={setDelId}/>)}
          </div>
        )}

        {tab==='stats' && (
          <div style={{marginTop:16}}>
            {expense>0 && <CatBlock title="▼ Расходы по категориям" color={P.red} cats={expCats} total={expense}/>}
            {income>0  && <CatBlock title="▲ Доходы по категориям"  color={P.green} cats={incCats} total={income}/>}
            {filtered.length===0 && <Empty onAdd={()=>setShowForm(true)}/>}
          </div>
        )}
      </div>

      {delId && (
        <div style={{position:'fixed',inset:0,background:'#000000cc',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:100,padding:16,paddingBottom:'calc(16px + env(safe-area-inset-bottom))'}}>
          <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:20,padding:24,width:'100%',maxWidth:400}}>
            <div style={{fontSize:16,fontWeight:800,marginBottom:6,color:P.white}}>Удалить операцию?</div>
            <div style={{fontSize:14,color:P.muted,marginBottom:20}}>Это действие нельзя отменить.</div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setDelId(null)} style={{flex:1,background:'transparent',border:`1px solid ${P.border}`,color:P.muted2,borderRadius:12,padding:'12px 0',fontSize:14,cursor:'pointer',fontWeight:600}}>Отмена</button>
              <button onClick={()=>del(delId)} style={{flex:1,background:P.red,border:'none',color:P.white,borderRadius:12,padding:'12px 0',fontSize:14,fontWeight:800,cursor:'pointer'}}>Удалить</button>
            </div>
          </div>
        </div>
      )}

      {toast && (
        <div style={{position:'fixed',bottom:'calc(30px + env(safe-area-inset-bottom))',left:'50%',transform:'translateX(-50%)',background:toast.err?P.red:P.green,color:P.bg,borderRadius:12,padding:'10px 20px',fontSize:14,fontWeight:700,zIndex:200,whiteSpace:'nowrap',boxShadow:'0 4px 24px #0008'}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

function TRow({t,onDel}) {
  const isIncome = t.type==='income';
  return (
    <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:14,padding:'13px 14px',marginBottom:8,display:'flex',alignItems:'center',gap:12}}>
      <div style={{width:38,height:38,borderRadius:10,background:isIncome?'#22c55e15':'#ef444415',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>
        {ICONS[t.category]||'📌'}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:14,fontWeight:700,color:P.white,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.category}</div>
        <div style={{fontSize:12,color:P.muted,marginTop:2}}>{t.note||'—'} · {t.date.slice(5).replace('-','.')}</div>
      </div>
      <div style={{textAlign:'right',flexShrink:0}}>
        <div style={{fontSize:15,fontWeight:800,color:isIncome?P.green:P.red}}>{isIncome?'+':'−'}{fmt(t.amount)}</div>
        <button onClick={()=>onDel(t.id)} style={{background:'none',border:'none',color:P.muted,fontSize:11,cursor:'pointer',padding:0,marginTop:3}}>удалить</button>
      </div>
    </div>
  );
}

function CatBlock({title,color,cats,total}) {
  return (
    <div style={{background:P.card,border:`1px solid ${P.border}`,borderRadius:18,padding:18,marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:700,color,marginBottom:14}}>{title}</div>
      {cats.map(([cat,sum])=>{
        const pct=Math.round(sum/total*100);
        return (
          <div key={cat} style={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <div style={{fontSize:13}}>{cat}</div>
              <div style={{fontSize:13,fontWeight:700}}>{fmt(sum)} <span style={{color:P.muted,fontWeight:400}}>({pct}%)</span></div>
            </div>
            <div style={{height:4,background:P.border,borderRadius:2,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${pct}%`,background:color,borderRadius:2}}/>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Empty({onAdd}) {
  return (
    <div style={{textAlign:'center',padding:'56px 0',color:P.muted}}>
      <div style={{fontSize:44,marginBottom:12}}>📊</div>
      <div style={{fontSize:16,fontWeight:700,color:P.white,marginBottom:6}}>Нет операций</div>
      <div style={{fontSize:13,marginBottom:24}}>Добавьте первую запись</div>
      <button onClick={onAdd} style={{background:P.green,border:'none',color:P.bg,borderRadius:12,padding:'11px 24px',fontSize:14,fontWeight:800,cursor:'pointer'}}>
        + Добавить операцию
      </button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
